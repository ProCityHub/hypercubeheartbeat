name: Covenant #3 outcome reminder

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: covenant-3-outcome-reminder
  cancel-in-progress: false

jobs:
  scan-run-records:
    name: Scan unlogged run records
    runs-on: ubuntu-latest

    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Open or update Covenant #3 clock issues
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [[ ! -f OUTCOMES.md ]]; then
            echo "::error::OUTCOMES.md is missing."
            exit 1
          fi

          now_epoch="$(date -u +%s)"
          run_files=(data/*_RUN.md)

          if (( ${#run_files[@]} == 0 )); then
            echo "No data/*_RUN.md files found."
            exit 0
          fi

          for file in "${run_files[@]}"; do
            added_at="$(
              git log \
                --follow \
                --diff-filter=A \
                --format="%cI" \
                -- "$file" |
              tail -n 1
            )"

            if [[ -z "$added_at" ]]; then
              echo "::warning file=$file::Unable to determine the git add-date."
              continue
            fi

            added_epoch="$(date -u -d "$added_at" +%s)"
            age_seconds=$((now_epoch - added_epoch))
            age_days=$((age_seconds / 86400))

            if (( age_days < 3 )); then
              echo "$file is $age_days day(s) old; Covenant clock not yet due."
              continue
            fi

            run_date="$(
              grep -Eom1 "[0-9]{4}-[0-9]{2}-[0-9]{2}" "$file" || true
            )"

            if [[ -n "$run_date" ]] && grep -Fq "$run_date" OUTCOMES.md; then
              echo "$file is represented in OUTCOMES.md by run date $run_date."
              continue
            fi

            title="COVENANT #3 CLOCK: outcome entry due for $file"
            displayed_run_date="${run_date:-NOT FOUND IN RUN FILE}"

            body="$(
              cat <<EOF
## Covenant #3 outcome clock

A run record has been present for at least three days without a
corresponding run-date entry in \`OUTCOMES.md\`.

- Run file: \`$file\`
- Git add-date: \`$added_at\`
- Age at this scan: **$age_days day(s)**
- Run date detected in file: \`$displayed_run_date\`
- Required ledger: \`OUTCOMES.md\`

Covenant #3 requires negative results to be committed within seven
days of the run. Review the run honestly and add the corresponding
append-only outcome entry before that window closes.

This workflow is read-only with respect to repository contents. It
opens or updates this issue; it never commits or modifies project files.

_Last checked: $(date -u +"%Y-%m-%dT%H:%M:%SZ")_
EOF
            )"

            find_exact_issue() {
              local state="$1"

              gh search issues "$title" \
                --repo "$GITHUB_REPOSITORY" \
                --state "$state" \
                --match title \
                --limit 1000 \
                --json number,title,state |
                jq -c --arg title "$title" \
                  '[.[] | select(.title == $title)][0] // empty'
            }

            match="$(find_exact_issue open)"

            if [[ -z "$match" ]]; then
              match="$(find_exact_issue closed)"
            fi

            issue_number="$(jq -r '.number // empty' <<<"$match")"
            issue_state="$(jq -r '.state // empty' <<<"$match")"

            if [[ -n "$issue_number" ]]; then
              if [[ "$issue_state" == "CLOSED" ]]; then
                gh issue reopen "$issue_number" --repo "$GITHUB_REPOSITORY"
              fi

              gh issue edit "$issue_number" \
                --repo "$GITHUB_REPOSITORY" \
                --body "$body"

              echo "Updated issue #$issue_number for $file."
            else
              issue_url="$(
                gh issue create \
                  --repo "$GITHUB_REPOSITORY" \
                  --title "$title" \
                  --body "$body"
              )"

              echo "Opened $issue_url"
            fi
          done
